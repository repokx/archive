<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">

  <title>Slumber Archive</title>
  <meta name="description" content="A blog archive">

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>

<body>
  <div id="app">Loading...</div>

  <script>
    window.$docsify = {
      name: 'Slumber Archive',
      repo: '',

      auto2top: true,
      loadSidebar: true,

      maxLevel: 0,
      subMaxLevel: 0,

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索',
        noData: '没有结果',
        depth: 4,
        hideOtherSidebarContent: false,
        namespace: 'slumber-archive'
      },

      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === 'math') {
              return '<div class="math">\\[' + code + '\\]</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    };
  </script>

  <!-- MathJax 配置：必须放在 MathJax 脚本前面 -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        processEnvironments: true,
        tags: 'ams',
        packages: {'[+]': ['ams', 'boldsymbol', 'mathtools', 'physics']}
      },
      loader: {
        load: ['[tex]/ams', '[tex]/boldsymbol', '[tex]/mathtools', '[tex]/physics']
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      },
      svg: {
        fontCache: 'global'
      },
      startup: {
        ready: () => {
          MathJax.startup.defaultReady();
          window.MathJaxReady = true;
        }
      }
    };
  </script>

  <!-- Docsify 主程序 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- 搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- 图片缩放插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>

  <!-- MathJax -->
  <script defer src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <!-- Docsify + MathJax 重渲染钩子 -->
  <script>
    window.$docsify.plugins = [].concat(function(hook) {
      hook.doneEach(function() {
        if (window.MathJax && window.MathJax.typesetPromise) {
          window.MathJax.typesetPromise();
        }
      });
    }, window.$docsify.plugins || []);
  </script>

  <!-- 代码高亮：按需扩展 -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-latex.min.js"></script>
</body>

</html>
